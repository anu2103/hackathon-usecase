name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Configure Docker
      run: |
        gcloud auth configure-docker

    - name: Build Patient Service Image
      run: |
        docker build -t gcr.io/devops-hackathon-490406/patient-service ./patient-service

    - name: Push Patient Service Image
      run: |
        docker push gcr.io/devops-hackathon-490406/patient-service

    - name: Build Order Service Image
      run: |
        docker build -t gcr.io/devops-hackathon-490406/order-service ./order-service

    - name: Push Order Service Image
      run: |
        docker push gcr.io/devops-hackathon-490406/order-service
